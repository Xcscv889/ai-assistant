# AI Office Assistant - 模型配置

models:
  # 默认使用的模型
  default: deepseek

  claude:
    provider: anthropic
    model: claude-sonnet-5
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 8192
    temperature: 0.7

  openai:
    provider: openai
    model: gpt-4o
    api_key_env: OPENAI_API_KEY
    max_tokens: 8192
    temperature: 0.7

  deepseek:
    provider: openai
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com/v1
    max_tokens: 8192
    temperature: 0.7

  deepseek-reasoner:
    provider: openai
    model: deepseek-reasoner
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com/v1
    max_tokens: 8192
    temperature: 0.7

  ollama:
    provider: ollama
    model: qwen2.5:14b
    base_url: http://localhost:11434
    temperature: 0.7

  # 轻量模型 — 用于意图识别等简单任务
  lightweight:
    provider: ollama
    model: qwen2.5:7b
    base_url: http://localhost:11434
    temperature: 0.3

# Embedding 模型配置
embeddings:
  default: local

  local:
    provider: sentence-transformers
    model: BAAI/bge-large-zh-v1.5
    device: cpu

  openai:
    provider: openai
    model: text-embedding-3-small
    api_key_env: OPENAI_API_KEY
